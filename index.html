<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>?? Pump.Fun Token Scanner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: #060612;
            color: #e0e0e0;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(0,255,136,.06) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(0,120,255,.06) 0%, transparent 55%);
            z-index: -1;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

        /* -- HEADER -- */
        .header { text-align: center; padding: 36px 0 24px; }
        .header h1 {
            font-size: clamp(1.6rem, 4vw, 2.8rem);
            font-weight: 900;
            background: linear-gradient(135deg, #00ff88 0%, #00c8ff 50%, #ff00aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p { color: #666; margin-top: 8px; font-size: .95rem; }

        /* -- SEARCH -- */
        .search-box {
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(0,255,136,.18);
            border-radius: 18px;
            padding: 28px;
            margin-bottom: 24px;
        }
        .search-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .search-input {
            flex: 1; min-width: 260px;
            padding: 16px 20px;
            background: rgba(0,0,0,.45);
            border: 2px solid rgba(0,255,136,.25);
            border-radius: 12px;
            color: #00ff88;
            font-size: .95rem;
            font-family: 'Courier New', monospace;
            outline: none;
            direction: ltr;
            transition: border .25s, box-shadow .25s;
        }
        .search-input:focus {
            border-color: #00ff88;
            box-shadow: 0 0 18px rgba(0,255,136,.25);
        }
        .search-input::placeholder { color: #3a3a3a; }

        .scan-btn {
            padding: 16px 36px;
            background: linear-gradient(135deg, #00ff88, #00c060);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
            display: flex; align-items: center; gap: 8px;
        }
        .scan-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,255,136,.35); }
        .scan-btn:disabled { background: #333; color: #666; transform: none; box-shadow: none; cursor: not-allowed; }

        /* RPC Status */
        .rpc-status {
            margin-top: 14px;
            font-size: .8rem;
            color: #555;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .rpc-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .rpc-dot.ok { background: #00ff88; }
        .rpc-dot.bad { background: #ff3232; }
        .rpc-dot.checking { background: #ffc800; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

        /* -- LOADER -- */
        .loader { display: none; text-align: center; padding: 60px 0; }
        .loader.active { display: block; }
        .spinner {
            width: 56px; height: 56px;
            border: 4px solid rgba(0,255,136,.1);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 18px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader p { color: #00ff88; font-size: 1.1rem; animation: pulse 2s infinite; }

        /* -- ERROR -- */
        .error-box {
            display: none;
            background: rgba(255,50,50,.08);
            border: 1px solid rgba(255,50,50,.3);
            border-radius: 14px;
            padding: 20px 24px;
            color: #ff6060;
            margin: 16px 0;
            line-height: 1.7;
        }
        .error-box.active { display: block; }

        /* -- RESULTS -- */
        .results { display: none; }
        .results.active { display: block; animation: fadeUp .45s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:none} }

        /* Score card */
        .score-card {
            border-radius: 22px;
            padding: 36px;
            text-align: center;
            margin-bottom: 22px;
            position: relative;
            overflow: hidden;
            border: 2px solid;
        }
        .score-card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:4px;
        }
        .score-card.safe   { border-color:rgba(0,255,136,.4);  background:rgba(0,255,136,.04);  }
        .score-card.warn   { border-color:rgba(255,200,0,.4);  background:rgba(255,200,0,.04);  }
        .score-card.danger { border-color:rgba(255,50,50,.4);  background:rgba(255,50,50,.04);  }
        .score-card.safe::before   { background:linear-gradient(90deg,#00ff88,#00cc60); }
        .score-card.warn::before   { background:linear-gradient(90deg,#ffc800,#ff9900); }
        .score-card.danger::before { background:linear-gradient(90deg,#ff3232,#cc0000); }

        .score-name { font-size:1.3rem; color:#aaa; margin-bottom:6px; }
        .score-num  { font-size:5rem;  font-weight:900; line-height:1; }
        .score-card.safe   .score-num { color:#00ff88; }
        .score-card.warn   .score-num { color:#ffc800; }
        .score-card.danger .score-num { color:#ff3232; }

        .verdict {
            display:inline-block; margin-top:14px;
            padding:10px 28px; border-radius:50px;
            font-size:1.05rem; font-weight:700;
        }
        .score-card.safe   .verdict { background:rgba(0,255,136,.12); color:#00ff88; border:1px solid rgba(0,255,136,.3); }
        .score-card.warn   .verdict { background:rgba(255,200,0,.12);  color:#ffc800; border:1px solid rgba(255,200,0,.3);  }
        .score-card.danger .verdict { background:rgba(255,50,50,.12);  color:#ff3232; border:1px solid rgba(255,50,50,.3);  }

        /* Quick stats */
        .stats-grid {
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(170px,1fr));
            gap:14px;
            margin-bottom:22px;
        }
        .stat-card {
            background:rgba(255,255,255,.03);
            border:1px solid rgba(255,255,255,.08);
            border-radius:14px;
            padding:18px;
            text-align:center;
        }
        .stat-val  { font-size:1.55rem; font-weight:900; margin:6px 0; }
        .stat-lbl  { font-size:.78rem; color:#666; }

        /* Info grid */
        .info-grid {
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(340px,1fr));
            gap:18px;
            margin-bottom:22px;
        }
        .card {
            background:rgba(255,255,255,.025);
            border:1px solid rgba(255,255,255,.08);
            border-radius:18px;
            padding:24px;
            transition:border .25s, transform .25s;
        }
        .card:hover { border-color:rgba(0,255,136,.25); transform:translateY(-4px); }
        .card h3 {
            font-size:1rem; margin-bottom:16px;
            padding-bottom:10px;
            border-bottom:1px solid rgba(255,255,255,.08);
            display:flex; align-items:center; gap:8px;
        }
        .row {
            display:flex; justify-content:space-between; align-items:center;
            padding:9px 0; border-bottom:1px solid rgba(255,255,255,.04);
        }
        .row:last-child { border-bottom:none; }
        .lbl { color:#666; font-size:.88rem; }
        .val { font-weight:700; font-size:.92rem; direction:ltr; }
        .g { color:#00ff88; } .r { color:#ff4444; }
        .y { color:#ffc800; } .b { color:#00aaff; } .w { color:#fff; }

        /* Holders table */
        .holders-wrap { margin-bottom:22px; }
        table { width:100%; border-collapse:collapse; margin-top:14px; font-size:.84rem; }
        thead th { background:rgba(0,255,136,.08); padding:10px 12px; text-align:right; color:#00ff88; }
        tbody td { padding:9px 12px; border-bottom:1px solid rgba(255,255,255,.04); }
        tbody tr:hover { background:rgba(0,255,136,.04); }
        .addr { font-family:'Courier New',monospace; color:#00aaff; direction:ltr; }

        /* Progress bar */
        .prog { height:7px; background:rgba(255,255,255,.08); border-radius:6px; overflow:hidden; margin:6px 0 14px; }
        .prog-fill { height:100%; border-radius:6px; }

        /* Risk items */
        .risk-item {
            display:flex; align-items:flex-start; gap:10px;
            padding:11px 14px; border-radius:11px; margin:7px 0;
            font-size:.9rem; line-height:1.5;
        }
        .risk-item.ok   { background:rgba(0,255,136,.08); border:1px solid rgba(0,255,136,.18); }
        .risk-item.bad  { background:rgba(255,50,50,.08);  border:1px solid rgba(255,50,50,.18);  }
        .risk-item.warn { background:rgba(255,200,0,.08);  border:1px solid rgba(255,200,0,.18);  }

        /* Target grid */
        .target-card {
            background:linear-gradient(135deg,rgba(0,120,255,.08),rgba(0,255,136,.08));
            border:1px solid rgba(0,120,255,.25);
            border-radius:18px;
            padding:28px;
            margin-bottom:22px;
            text-align:center;
        }
        .target-card h3 { color:#00aaff; font-size:1.2rem; margin-bottom:20px; }
        .target-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:12px; }
        .target-item { background:rgba(0,0,0,.3); border-radius:13px; padding:18px 10px; }
        .target-item .mx { font-size:1.9rem; font-weight:900; }
        .target-item .tl { font-size:.78rem; color:#666; margin:4px 0; }
        .target-item .pb { font-size:.82rem; font-weight:700; }

        /* Dev history */
        .dev-item {
            display:flex; align-items:center; gap:12px;
            padding:11px; background:rgba(0,0,0,.2);
            border-radius:11px; margin:7px 0;
        }
        .badge {
            padding:4px 12px; border-radius:20px;
            font-size:.75rem; font-weight:700;
            white-space:nowrap;
        }
        .badge.rug  { background:rgba(255,50,50,.2);  color:#ff4444; }
        .badge.live { background:rgba(0,255,136,.2);  color:#00ff88; }
        .badge.dead { background:rgba(255,200,0,.2);  color:#ffc800; }

        /* Cluster */
        .cluster-box {
            background:rgba(255,50,50,.06);
            border:2px solid rgba(255,50,50,.3);
            border-radius:18px;
            padding:24px;
            margin-bottom:22px;
        }
        .cluster-box h3 { color:#ff4444; margin-bottom:12px; }

        /* Links */
        .links-row { display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
        .link-btn {
            padding:8px 18px; border-radius:9px;
            text-decoration:none; font-size:.82rem;
            font-weight:700; font-family:'Cairo',sans-serif;
            transition:filter .2s, transform .2s;
            display:flex; align-items:center; gap:5px;
        }
        .link-btn:hover { filter:brightness(1.25); transform:translateY(-2px); }
        .lb-g { background:rgba(0,255,136,.12); color:#00ff88; border:1px solid rgba(0,255,136,.25); }
        .lb-b { background:rgba(0,170,255,.12); color:#00aaff; border:1px solid rgba(0,170,255,.25); }
        .lb-y { background:rgba(255,200,0,.12);  color:#ffc800; border:1px solid rgba(255,200,0,.25);  }

        .copy-btn {
            background:none; border:1px solid rgba(0,170,255,.3);
            color:#00aaff; padding:2px 8px; border-radius:6px;
            cursor:pointer; font-size:.72rem; font-family:'Cairo',sans-serif;
            transition:background .2s;
        }
        .copy-btn:hover { background:rgba(0,170,255,.15); }

        .disclaimer {
            background:rgba(255,200,0,.04);
            border:1px solid rgba(255,200,0,.18);
            border-radius:12px;
            padding:16px 20px;
            text-align:center;
            color:#8a7000;
            font-size:.8rem;
            margin-top:28px;
        }

        /* Source tag */
        .source-tag {
            display:inline-block; padding:2px 8px;
            border-radius:5px; font-size:.7rem;
            margin-right:6px; vertical-align:middle;
        }
        .src-pf  { background:rgba(0,255,136,.15); color:#00ff88; }
        .src-sol { background:rgba(0,170,255,.15); color:#00aaff; }
        .src-est { background:rgba(255,200,0,.15);  color:#ffc800; }

        @media(max-width:600px){
            .header h1{font-size:1.4rem}
            .info-grid{grid-template-columns:1fr}
            .score-num{font-size:3.5rem}
        }
    </style>
</head>

<script>
/* -------------------------------------------------------
   RPC POOL  –  multiple endpoints to avoid CORS/rate-limit
   ------------------------------------------------------- */
const RPC_POOL = [
    'https://solana-mainnet.g.alchemy.com/v2/demo',          // Alchemy demo
    'https://rpc.ankr.com/solana',                            // Ankr (CORS-friendly)
    'https://mainnet.helius-rpc.com/?api-key=demo',           // Helius demo
    'https://solana-api.projectserum.com',                    // Serum
    'https://api.mainnet-beta.solana.com',                    // Official (may fail on file://)
];

let activeRPC = null;

/* -- find a working RPC on page load -- */
async function detectRPC() {
    const statusEl = document.getElementById('rpcStatus');
    for (const url of RPC_POOL) {
        try {
            const r = await fetchRPC(url, 'getHealth', [], 4000);
            if (r && !r.error) {
                activeRPC = url;
                const short = url.replace('https://','').split('/')[0];
                statusEl.innerHTML =
                    `<span><span class="rpc-dot ok"></span>RPC ????: <b>${short}</b></span>`;
                return;
            }
        } catch { }
    }
    statusEl.innerHTML =
        `<span><span class="rpc-dot bad"></span>
         ?????: ?? ?????? RPC ????? – ???????? ???? ??? endpoints ??? ?????</span>`;
}

/* -- raw RPC call with timeout -- */
async function fetchRPC(url, method, params, timeout = 10000) {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), timeout);
    try {
        const r = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ jsonrpc:'2.0', id:1, method, params }),
            signal: ctrl.signal
        });
        clearTimeout(tid);
        return await r.json();
    } catch (e) {
        clearTimeout(tid);
        throw e;
    }
}

/* -- RPC call that tries pool automatically -- */
async function rpc(method, params) {
    const urls = activeRPC
        ? [activeRPC, ...RPC_POOL.filter(u => u !== activeRPC)]
        : RPC_POOL;

    for (const url of urls) {
        try {
            const res = await fetchRPC(url, method, params);
            if (res && !res.error) {
                activeRPC = url;
                return res;
            }
        } catch { }
    }
    throw new Error(`??? ???? ??? RPC endpoints (${method})`);
}

/* -------------------------------------------------------
   TOKEN INFO
   ------------------------------------------------------- */
async function getTokenInfo(mint) {
    let decimals=6, totalSupply=0, uiSupply=0;
    let mintAuthority=null, freezeAuthority=null;

    try {
        const sr = await rpc('getTokenSupply', [mint]);
        const sv = sr?.result?.value;
        if (sv) {
            decimals = sv.decimals;
            totalSupply = sv.amount;
            uiSupply = sv.uiAmount || 0;
        }
    } catch {}

    try {
        const ar = await rpc('getAccountInfo', [mint, { encoding:'jsonParsed' }]);
        const info = ar?.result?.value?.data?.parsed?.info;
        if (info) {
            mintAuthority   = info.mintAuthority   || null;
            freezeAuthority = info.freezeAuthority || null;
            if (!decimals) decimals = info.decimals || 6;
        }
    } catch {}

    /* Price from Jupiter v2 (no CORS issue – public API) */
    let price = 0, marketCap = 0;
    try {
        const pr = await fetch(
            `https://api.jup.ag/price/v2?ids=${mint}`,
            { headers:{ 'Accept':'application/json' } }
        );
        if (pr.ok) {
            const pd = await pr.json();
            price = parseFloat(pd?.data?.[mint]?.price) || 0;
            marketCap = price * uiSupply;
        }
    } catch {}

    return { decimals, totalSupply, uiSupply, price, marketCap,
             mintAuthority, freezeAuthority,
             isRenounced: !mintAuthority };
}

/* -------------------------------------------------------
   TOP HOLDERS
   ------------------------------------------------------- */
async function getTopHolders(mint, uiSupply) {
    let holders = [];
    try {
        const r = await rpc('getTokenLargestAccounts', [mint]);
        const raw = r?.result?.value || [];
        holders = raw.map(a => ({
            address : a.address,
            amount  : parseFloat(a.uiAmount || 0),
            percent : uiSupply > 0 ? parseFloat(a.uiAmount || 0) / uiSupply * 100 : 0,
            owner   : null
        }));
    } catch(e) {
        console.warn('getTokenLargestAccounts failed:', e.message);
    }

    /* Resolve owner wallet for top 10 */
    const top10 = holders.slice(0, 10);
    await Promise.allSettled(top10.map(async (h, i) => {
        try {
            const r2 = await rpc('getAccountInfo', [h.address, { encoding:'jsonParsed' }]);
            const owner = r2?.result?.value?.data?.parsed?.info?.owner;
            if (owner) holders[i].owner = owner;
        } catch {}
    }));

    return {
        holders,
        top5Percent  : holders.slice(0, 5) .reduce((s,h) => s + h.percent, 0),
        top10Percent : holders.slice(0, 10).reduce((s,h) => s + h.percent, 0),
        holderCount  : holders.length,
    };
}

/* -------------------------------------------------------
   PUMP.FUN  DATA
   ------------------------------------------------------- */
async function getPumpData(mint) {
    const def = {
        isPumpFun:false, dev:null, devSolBalance:0,
        bondingCurve:null, complete:false, raydiumPool:null,
        name:'', symbol:'', description:'',
        twitter:'', telegram:'', website:'',
        marketCap:0, createdAt:null
    };

    /* CORS note: pump.fun API *does* send CORS headers for browser requests,
       but only from https origins. We use a tiny public CORS proxy as fallback. */
    const PF_URLS = [
        `https://frontend-api.pump.fun/coins/${mint}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent('https://frontend-api.pump.fun/coins/'+mint)}`,
        `https://corsproxy.io/?${encodeURIComponent('https://frontend-api.pump.fun/coins/'+mint)}`
    ];

    for (const url of PF_URLS) {
        try {
            const r = await fetch(url, { signal: AbortSignal.timeout(7000) });
            if (!r.ok) continue;
            const d = await r.json();
            if (!d || !d.mint) continue;

            def.isPumpFun      = true;
            def.dev            = d.creator       || null;
            def.bondingCurve   = d.bonding_curve  || null;
            def.complete       = d.complete        || false;
            def.raydiumPool    = d.raydium_pool    || null;
            def.name           = d.name            || '';
            def.symbol         = d.symbol          || '';
            def.description    = d.description     || '';
            def.twitter        = d.twitter         || '';
            def.telegram       = d.telegram        || '';
            def.website        = d.website         || '';
            def.marketCap      = d.usd_market_cap  || 0;
            def.createdAt      = d.created_timestamp || null;
            break;
        } catch {}
    }

    /* Dev SOL balance */
    if (def.dev) {
        try {
            const br = await rpc('getBalance', [def.dev]);
            def.devSolBalance = (br?.result?.value || 0) / 1e9;
        } catch {}
    }

    return def;
}

/* -------------------------------------------------------
   DEV ANALYSIS
   ------------------------------------------------------- */
async function getDevAnalysis(pumpData, currentMint) {
    const out = {
        address: pumpData.dev || null,
        totalTokens:0, ruggedTokens:0, successfulTokens:0, deadTokens:0,
        tokens:[], reputation:'unknown', solBalance:pumpData.devSolBalance || 0,
    };
    if (!pumpData.dev) return out;

    const DEV_URLS = [
        `https://frontend-api.pump.fun/coins/user-created-coins/${pumpData.dev}?offset=0&limit=50&includeNsfw=true`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent('https://frontend-api.pump.fun/coins/user-created-coins/'+pumpData.dev+'?offset=0&limit=50&includeNsfw=true')}`,
    ];

    let tokens = [];
    for (const url of DEV_URLS) {
        try {
            const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
            if (!r.ok) continue;
            tokens = await r.json();
            if (Array.isArray(tokens)) break;
            tokens = [];
        } catch {}
    }

    out.totalTokens = tokens.length;

    for (const t of tokens.slice(0, 30)) {
        const mcap = t.usd_market_cap || 0;
        let status;
        if (t.complete && t.raydium_pool && mcap > 40000) {
            status = 'live'; out.successfulTokens++;
        } else if (!t.complete && mcap < 800) {
            status = 'rug'; out.ruggedTokens++;
        } else {
            status = 'dead'; out.deadTokens++;
        }
        out.tokens.push({
            name: t.name || '?',
            symbol: t.symbol || '?',
            mint: t.mint,
            mcap,
            status,
            isCurrent: t.mint === currentMint,
        });
    }

    const rugPct = out.totalTokens > 0 ? out.ruggedTokens / out.totalTokens : 0;
    if (out.totalTokens <= 1)      out.reputation = 'new';
    else if (rugPct > 0.6)         out.reputation = 'scammer';
    else if (rugPct > 0.3)         out.reputation = 'suspicious';
    else if (out.successfulTokens >= 2) out.reputation = 'trusted';
    else                           out.reputation = 'neutral';

    return out;
}

/* -------------------------------------------------------
   CLUSTER ANALYSIS
   ------------------------------------------------------- */
function analyzeCluster(holders) {
    const out = { found:false, totalPct:0, riskLevel:'low', groups:[] };
    const hs = holders.filter(h => h.percent >= 0.5 && h.percent < 25);
    if (hs.length < 4) return out;

    const used = new Set();
    for (let i = 0; i < hs.length; i++) {
        if (used.has(i)) continue;
        const grp = [i];
        for (let j = i+1; j < hs.length; j++) {
            if (used.has(j)) continue;
            const ratio = hs[i].amount > 0 ? hs[j].amount / hs[i].amount : 0;
            if (ratio > 0.72 && ratio < 1.28) { grp.push(j); used.add(j); }
        }
        if (grp.length >= 3) {
            const pct = grp.reduce((s,k) => s + hs[k].percent, 0);
            out.groups.push({ count:grp.length, pct });
            out.totalPct += pct;
            out.found = true;
        }
        used.add(i);
    }
    if (out.totalPct > 30) out.riskLevel = 'high';
    else if (out.totalPct > 15) out.riskLevel = 'medium';
    return out;
}

/* -------------------------------------------------------
   SCORE
   ------------------------------------------------------- */
function calcScore(tokenInfo, holdersData, pumpData, devAnalysis, cluster) {
    let score = 100;
    const risks = [], pros = [];

    if (tokenInfo.mintAuthority) {
        score -= 25;
        risks.push('Mint Authority ?? ??? ?????? ???? – ???? ????? ????? ?????');
    } else pros.push('Mint Authority ????? ???? ?');

    if (tokenInfo.freezeAuthority) {
        score -= 20;
        risks.push('Freeze Authority ?????? – ???? ????? ???????');
    } else pros.push('?? ???? Freeze Authority ?');

    const t10 = holdersData.top10Percent;
    if (t10 > 50) { score -= 20; risks.push(`???? 10 ????? ???? ${t10.toFixed(1)}% – ????? ???? ????`); }
    else if (t10 > 30) { score -= 10; risks.push(`???? 10 ????? ???? ${t10.toFixed(1)}% – ????? ?????`); }
    else pros.push(`????? ??? – ???? 10 ????? ???? ${t10.toFixed(1)}% ?`);

    const top1 = holdersData.holders[0];
    if (top1 && top1.percent > 20) {
        score -= 15;
        risks.push(`????? ????? ???? ${top1.percent.toFixed(1)}% – ??? Dump`);
    }

    if (cluster.found) {
        const dec = cluster.riskLevel === 'high' ? 20 : 10;
        score -= dec;
        risks.push(`?????? ????? ???? ${cluster.totalPct.toFixed(1)}% – ?????? ?????`);
    } else pros.push('?? ???????? ?????? ?');

    if (devAnalysis.reputation === 'scammer') {
        score -= 30;
        risks.push(`?????? ???? ?????! ${devAnalysis.ruggedTokens}/${devAnalysis.totalTokens} Rug`);
    } else if (devAnalysis.reputation === 'suspicious') {
        score -= 15;
        risks.push(`?????? ????? – ???? Rug ?????`);
    } else if (devAnalysis.reputation === 'trusted') {
        score += 5;
        pros.push(`?????? ????? – ${devAnalysis.successfulTokens} ???? ????? ?`);
    } else if (devAnalysis.reputation === 'new') {
        score -= 5;
        risks.push('?????? ???? – ?? ????? ????');
    }

    if (pumpData.isPumpFun) {
        pros.push('?????? ??? Pump.Fun ?');
        if (pumpData.complete) { score += 5; pros.push('????? Bonding Curve ?'); }
        else { score -= 5; risks.push('Bonding Curve ?? ????? ???'); }
        if (pumpData.raydiumPool) { score += 5; pros.push('Raydium Pool ????? ?'); }
        if (!pumpData.twitter && !pumpData.telegram && !pumpData.website) {
            score -= 5; risks.push('?? ?????? ?????');
        } else {
            if (pumpData.twitter)  pros.push('Twitter ????? ?');
            if (pumpData.telegram) pros.push('Telegram ????? ?');
            if (pumpData.website)  pros.push('???? ??? ????? ?');
        }
    }

    score = Math.max(0, Math.min(100, Math.round(score)));
    const mcap = pumpData.marketCap || tokenInfo.marketCap || 0;
    return { score, risks, pros, mcap, targets: calcTargets(mcap, score) };
}

function calcTargets(mcap, score) {
    const f = score / 100;
    const mk = v => `$${fmt(mcap * v)}`;
    const p  = (base, boost) => Math.min(base + boost * f, 75);
    return [
        { x:'2x',   mc:mk(2),   pct:p(28,35), },
        { x:'5x',   mc:mk(5),   pct:p(14,25), },
        { x:'10x',  mc:mk(10),  pct:p(7,18),  },
        { x:'50x',  mc:mk(50),  pct:p(2,10),  },
        { x:'100x', mc:mk(100), pct:p(1,6),   },
    ].map(t => ({
        ...t,
        pct: t.pct.toFixed(0),
        color: t.pct > 40 ? '#00ff88' : t.pct > 20 ? '#ffc800' : '#ff4444',
    }));
}

    if (n>=1e9) return (n/1e9).toFixed(2)+'B';
    if (n>=1e6) return (n/1e6).toFixed(2)+'M';
    if (n>=1e3) return (n/1e3).toFixed(2)+'K';
    return Number(n).toFixed(2);
};
