<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pump.Fun Token Scanner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Cairo',sans-serif;
background:#060612;
color:#e0e0e0;
min-height:100vh;
}
body::before{
content:'';position:fixed;inset:0;
background:
radial-gradient(ellipse at 20% 30%,rgba(0,255,136,.06) 0%,transparent 55%),
radial-gradient(ellipse at 80% 70%,rgba(0,120,255,.06) 0%,transparent 55%);
z-index:-1;
}
.ctn{max-width:1100px;margin:0 auto;padding:24px 16px}
.hdr{text-align:center;padding:36px 0 24px}
.hdr h1{
font-size:clamp(1.6rem,4vw,2.8rem);font-weight:900;
background:linear-gradient(135deg,#00ff88,#00c8ff,#ff00aa);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
background-clip:text;
}
.hdr p{color:#666;margin-top:8px;font-size:.95rem}
.sbox{
background:rgba(255,255,255,.03);
border:1px solid rgba(0,255,136,.18);
border-radius:18px;padding:28px;margin-bottom:24px;
}
.srow{display:flex;gap:12px;flex-wrap:wrap}
.sinp{
flex:1;min-width:260px;padding:16px 20px;
background:rgba(0,0,0,.45);
border:2px solid rgba(0,255,136,.25);
border-radius:12px;color:#00ff88;
font-size:.95rem;font-family:'Courier New',monospace;
outline:none;direction:ltr;
transition:border .25s,box-shadow .25s;
}
.sinp:focus{border-color:#00ff88;box-shadow:0 0 18px rgba(0,255,136,.25)}
.sinp::placeholder{color:#3a3a3a}
.sbtn{
padding:16px 36px;
background:linear-gradient(135deg,#00ff88,#00c060);
color:#000;border:none;border-radius:12px;
font-size:1rem;font-weight:700;font-family:'Cairo',sans-serif;
cursor:pointer;transition:transform .2s,box-shadow .2s;
display:flex;align-items:center;gap:8px;
}
.sbtn:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,255,136,.35)}
.sbtn:disabled{background:#333;color:#666;transform:none;box-shadow:none;cursor:not-allowed}
.rpcst{margin-top:14px;font-size:.8rem;color:#555;display:flex;gap:16px;flex-wrap:wrap}
.rdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:5px}
.rdot.ok{background:#00ff88}
.rdot.bad{background:#ff3232}
.rdot.chk{background:#ffc800;animation:pls 1s infinite}
@keyframes pls{0%,100%{opacity:.4}50%{opacity:1}}
.ldr{display:none;text-align:center;padding:60px 0}
.ldr.on{display:block}
.spn{
width:56px;height:56px;
border:4px solid rgba(0,255,136,.1);
border-top-color:#00ff88;border-radius:50%;
animation:sp 1s linear infinite;
margin:0 auto 18px;
}
@keyframes sp{to{transform:rotate(360deg)}}
.ldr p{color:#00ff88;font-size:1.1rem;animation:pls 2s infinite}
.ebox{
display:none;
background:rgba(255,50,50,.08);
border:1px solid rgba(255,50,50,.3);
border-radius:14px;padding:20px 24px;
color:#ff6060;margin:16px 0;line-height:1.7;
}
.ebox.on{display:block}
.res{display:none}
.res.on{display:block;animation:fu .45s ease}
@keyframes fu{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
.scrd{
border-radius:22px;padding:36px;text-align:center;
margin-bottom:22px;position:relative;overflow:hidden;border:2px solid;
}
.scrd::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.scrd.sf{border-color:rgba(0,255,136,.4);background:rgba(0,255,136,.04)}
.scrd.wn{border-color:rgba(255,200,0,.4);background:rgba(255,200,0,.04)}
.scrd.dg{border-color:rgba(255,50,50,.4);background:rgba(255,50,50,.04)}
.scrd.sf::before{background:linear-gradient(90deg,#00ff88,#00cc60)}
.scrd.wn::before{background:linear-gradient(90deg,#ffc800,#ff9900)}
.scrd.dg::before{background:linear-gradient(90deg,#ff3232,#cc0000)}
.snm{font-size:1.3rem;color:#aaa;margin-bottom:6px}
.sno{font-size:5rem;font-weight:900;line-height:1}
.scrd.sf .sno{color:#00ff88}
.scrd.wn .sno{color:#ffc800}
.scrd.dg .sno{color:#ff3232}
.vrd{
display:inline-block;margin-top:14px;
padding:10px 28px;border-radius:50px;
font-size:1.05rem;font-weight:700;
}
.scrd.sf .vrd{background:rgba(0,255,136,.12);color:#00ff88;border:1px solid rgba(0,255,136,.3)}
.scrd.wn .vrd{background:rgba(255,200,0,.12);color:#ffc800;border:1px solid rgba(255,200,0,.3)}
.scrd.dg .vrd{background:rgba(255,50,50,.12);color:#ff3232;border:1px solid rgba(255,50,50,.3)}
.sgrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:14px;margin-bottom:22px;
}
.stcd{
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.08);
border-radius:14px;padding:18px;text-align:center;
}
.stv{font-size:1.55rem;font-weight:900;margin:6px 0}
.stl{font-size:.78rem;color:#666}
.igrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
gap:18px;margin-bottom:22px;
}
.crd{
background:rgba(255,255,255,.025);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;padding:24px;
transition:border .25s,transform .25s;
}
.crd:hover{border-color:rgba(0,255,136,.25);transform:translateY(-4px)}
.crd h3{
font-size:1rem;margin-bottom:16px;
padding-bottom:10px;
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;align-items:center;gap:8px;
}
.rw{
display:flex;justify-content:space-between;align-items:center;
padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);
}
.rw:last-child{border-bottom:none}
.lb{color:#666;font-size:.88rem}
.vl{font-weight:700;font-size:.92rem;direction:ltr}
.g{color:#00ff88}.r{color:#ff4444}
.y{color:#ffc800}.b{color:#00aaff}.w{color:#fff}
.hwrap{margin-bottom:22px}
table{width:100%;border-collapse:collapse;margin-top:14px;font-size:.84rem}
thead th{background:rgba(0,255,136,.08);padding:10px 12px;text-align:right;color:#00ff88}
tbody td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04)}
tbody tr:hover{background:rgba(0,255,136,.04)}
.adr{font-family:'Courier New',monospace;color:#00aaff;direction:ltr}
.prg{height:7px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden;margin:6px 0 14px}
.pf{height:100%;border-radius:6px}
.ri{
display:flex;align-items:flex-start;gap:10px;
padding:11px 14px;border-radius:11px;margin:7px 0;
font-size:.9rem;line-height:1.5;
}
.ri.ok{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.18)}
.ri.bd{background:rgba(255,50,50,.08);border:1px solid rgba(255,50,50,.18)}
.tcrd{
background:linear-gradient(135deg,rgba(0,120,255,.08),rgba(0,255,136,.08));
border:1px solid rgba(0,120,255,.25);
border-radius:18px;padding:28px;margin-bottom:22px;text-align:center;
}
.tcrd h3{color:#00aaff;font-size:1.2rem;margin-bottom:20px}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.ti{background:rgba(0,0,0,.3);border-radius:13px;padding:18px 10px}
.ti .mx{font-size:1.9rem;font-weight:900}
.ti .tl{font-size:.78rem;color:#666;margin:4px 0}
.ti .pb{font-size:.82rem;font-weight:700}
