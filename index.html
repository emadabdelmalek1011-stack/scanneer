<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Token Scanner - AI Powered</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
background:#08090d;
color:#c8ccd4;
min-height:100vh;
line-height:1.6;
}
:root{
--g:#00f593;--r:#ff3b5c;--y:#ffb700;--b:#3b82f6;
--bg1:#0d1017;--bg2:#141822;--bg3:#1a1f2e;
--brd:rgba(255,255,255,.06);
}

/* GRID BACKGROUND */
body::before{
content:'';position:fixed;inset:0;z-index:-1;
background:
linear-gradient(rgba(0,245,147,.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(0,245,147,.03) 1px,transparent 1px);
background-size:40px 40px;
}

.app{max-width:1200px;margin:0 auto;padding:20px}

/* === HEADER === */
.hd{text-align:center;padding:40px 0 30px}
.hd h1{
font-size:2.2rem;font-weight:800;
background:linear-gradient(135deg,var(--g),var(--b));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
letter-spacing:-.5px;
}
.hd .sub{color:#555;margin-top:8px;font-size:.9rem}
.hd .badges{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.hd .badge{
padding:4px 14px;border-radius:20px;font-size:.72rem;font-weight:600;
border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);
}

/* === SEARCH === */
.search-panel{
background:var(--bg2);
border:1px solid var(--brd);
border-radius:16px;
padding:24px;
margin-bottom:24px;
}
.search-row{display:flex;gap:12px}
.search-input{
flex:1;padding:14px 18px;
background:var(--bg1);
border:1.5px solid rgba(0,245,147,.15);
border-radius:12px;
color:var(--g);
font-size:.95rem;
font-family:'SF Mono','Fira Code',monospace;
outline:none;
transition:all .3s;
}
.search-input:focus{
border-color:var(--g);
box-shadow:0 0 0 3px rgba(0,245,147,.1);
}
.search-input::placeholder{color:#333}
.scan-btn{
padding:14px 32px;
background:var(--g);
color:#000;
border:none;
border-radius:12px;
font-size:.95rem;
font-weight:700;
cursor:pointer;
transition:all .2s;
white-space:nowrap;
}
.scan-btn:hover{
transform:translateY(-2px);
box-shadow:0 6px 24px rgba(0,245,147,.3);
}
.scan-btn:disabled{
background:#222;color:#555;
transform:none;box-shadow:none;
cursor:wait;
}

/* Status bar */
.status-bar{
display:flex;gap:12px;margin-top:14px;
align-items:center;flex-wrap:wrap;
font-size:.78rem;color:#444;
}
.st-dot{
width:7px;height:7px;border-radius:50%;
display:inline-block;margin-right:4px;
}
.st-dot.on{background:var(--g);box-shadow:0 0 6px var(--g)}
.st-dot.off{background:var(--r)}
.st-dot.wait{background:var(--y);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}

/* === LOADER === */
.loader{display:none;padding:60px 0;text-align:center}
.loader.on{display:block}
.loader-ring{
width:48px;height:48px;
border:3px solid var(--bg3);
border-top-color:var(--g);
border-radius:50%;
animation:spin .8s linear infinite;
margin:0 auto 20px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{color:var(--g);font-size:.95rem}
.loader-steps{
margin-top:20px;
display:flex;flex-direction:column;
gap:6px;align-items:center;
}
.step{
font-size:.78rem;color:#444;
display:flex;align-items:center;gap:6px;
}
.step.done{color:var(--g)}
.step.active{color:var(--y)}

/* === ERROR === */
.err{
display:none;
background:rgba(255,59,92,.06);
border:1px solid rgba(255,59,92,.2);
border-radius:12px;
padding:18px 22px;
color:var(--r);
margin:16px 0;
font-size:.9rem;
}
.err.on{display:block}

/* === RESULTS === */
.results{display:none}
.results.on{display:block;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* Main Score */
.main-score{
background:var(--bg2);
border:1.5px solid;
border-radius:20px;
padding:40px;
text-align:center;
margin-bottom:20px;
position:relative;
overflow:hidden;
}
.main-score::after{
content:'';position:absolute;top:0;left:0;right:0;height:3px;
}
.main-score.safe{border-color:rgba(0,245,147,.3)}
.main-score.safe::after{background:linear-gradient(90deg,var(--g),#00c9ff)}
.main-score.warn{border-color:rgba(255,183,0,.3)}
.main-score.warn::after{background:linear-gradient(90deg,var(--y),#ff8c00)}
.main-score.danger{border-color:rgba(255,59,92,.3)}
.main-score.danger::after{background:linear-gradient(90deg,var(--r),#cc0033)}

.token-name{font-size:1.1rem;color:#666;margin-bottom:4px}
.score-ring{
width:160px;height:160px;
margin:20px auto;
position:relative;
}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:8;stroke-linecap:round}
.score-ring .bg{stroke:var(--bg3)}
.score-ring .fg{transition:stroke-dashoffset 1.5s ease}
.score-val{
position:absolute;inset:0;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
}
.score-val .num{font-size:3rem;font-weight:900;line-height:1}
.score-val .lbl{font-size:.75rem;color:#666;text-transform:uppercase;letter-spacing:1px}
.main-score.safe .score-val .num{color:var(--g)}
.main-score.warn .score-val .num{color:var(--y)}
.main-score.danger .score-val .num{color:var(--r)}
.verdict-text{
display:inline-block;margin-top:16px;
padding:8px 24px;border-radius:30px;
font-size:.9rem;font-weight:600;
}
.main-score.safe .verdict-text{background:rgba(0,245,147,.08);color:var(--g);border:1px solid rgba(0,245,147,.2)}
.main-score.warn .verdict-text{background:rgba(255,183,0,.08);color:var(--y);border:1px solid rgba(255,183,0,.2)}
.main-score.danger .verdict-text{background:rgba(255,59,92,.08);color:var(--r);border:1px solid rgba(255,59,92,.2)}

/* AI verdict */
.ai-verdict{
background:linear-gradient(135deg,rgba(59,130,246,.06),rgba(0,245,147,.06));
border:1px solid rgba(59,130,246,.2);
border-radius:14px;
padding:20px 24px;
margin:20px 0;
font-size:.88rem;
line-height:1.7;
}
.ai-verdict h4{color:var(--b);margin-bottom:10px;font-size:.95rem;display:flex;align-items:center;gap:8px}

/* Stats Grid */
.stats{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;margin:20px 0;
}
.stat{
background:var(--bg2);
border:1px solid var(--brd);
border-radius:12px;
padding:16px;text-align:center;
transition:border-color .2s;
}
.stat:hover{border-color:rgba(0,245,147,.2)}
.stat .v{font-size:1.4rem;font-weight:800;margin:6px 0}
.stat .l{font-size:.72rem;color:#555;text-transform:uppercase;letter-spacing:.5px}

/* Cards Grid */
.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(380px,1fr));
gap:16px;margin:20px 0;
}
.card{
background:var(--bg2);
border:1px solid var(--brd);
border-radius:14px;
padding:22px;
transition:all .25s;
}
.card:hover{border-color:rgba(0,245,147,.15);transform:translateY(-2px)}
.card h3{
font-size:.9rem;font-weight:700;
margin-bottom:14px;padding-bottom:10px;
border-bottom:1px solid var(--brd);
display:flex;align-items:center;gap:8px;
color:#fff;
}
.card .row{
display:flex;justify-content:space-between;
align-items:center;padding:7px 0;
border-bottom:1px solid rgba(255,255,255,.02);
font-size:.85rem;
}
.card .row:last-child{border-bottom:none}
.card .k{color:#555}
.card .v2{font-weight:600}

/* Holders Table */
.htable{
background:var(--bg2);
border:1px solid var(--brd);
border-radius:14px;
padding:22px;margin:20px 0;
overflow-x:auto;
}
.htable h3{
font-size:.9rem;font-weight:700;
margin-bottom:14px;padding-bottom:10px;
border-bottom:1px solid var(--brd);
color:#fff;
}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{
background:rgba(0,245,147,.05);
padding:10px;text-align:left;
color:var(--g);font-weight:600;
border-bottom:1px solid var(--brd);
}
td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.02)}
tr:hover{background:rgba(0,245,147,.02)}
.mono{font-family:'SF Mono','Fira Code',monospace;color:var(--b);font-size:.78rem}

/* Progress */
.pbar{height:5px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:4px 0 12px}
.pfill{height:100%;border-radius:4px;transition:width 1s ease}

/* Risk Items */
.ritem{
display:flex;align-items:center;gap:10px;
padding:10px 14px;border-radius:10px;
margin:6px 0;font-size:.84rem;
}
.ritem.ok{background:rgba(0,245,147,.05);border:1px solid rgba(0,245,147,.12)}
.ritem.bad{background:rgba(255,59,92,.05);border:1px solid rgba(255,59,92,.12)}
.ritem.mid{background:rgba(255,183,0,.05);border:1px solid rgba(255,183,0,.12)}

/* Target */
.target-panel{
background:linear-gradient(135deg,var(--bg2),rgba(59,130,246,.04));
border:1px solid rgba(59,130,246,.2);
border-radius:14px;
padding:24px;margin:20px 0;
text-align:center;
}
.target-panel h3{color:var(--b);margin-bottom:16px;font-size:1rem}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
.titem{background:var(--bg1);border-radius:10px;padding:14px 8px}
.titem .tx{font-size:1.6rem;font-weight:900}
.titem .tmc{font-size:.7rem;color:#555;margin:3px 0}
.titem .tp{font-size:.78rem;font-weight:600}

/* Dev Panel */
.dev-panel{
background:var(--bg2);
border:1px solid var(--brd);
border-radius:14px;
padding:22px;margin:20px 0;
}
.dev-panel h3{
font-size:.9rem;font-weight:700;
margin-bottom:14px;padding-bottom:10px;
border-bottom:1px solid var(--brd);color:#fff;
}
.dev-token{
display:flex;align-items:center;gap:12px;
padding:10px;background:var(--bg1);
border-radius:10px;margin:6px 0;
font-size:.82rem;
}
.dtag{
padding:3px 10px;border-radius:12px;
font-size:.7rem;font-weight:600;
}
.dtag.rug{background:rgba(255,59,92,.15);color:var(--r)}
.dtag.live{background:rgba(0,245,147,.15);color:var(--g)}
.dtag.dead{background:rgba(255,183,0,.15);color:var(--y)}

/* Cluster */
.cluster-alert{
background:rgba(255,59,92,.04);
border:1.5px solid rgba(255,59,92,.25);
border-radius:14px;
padding:22px;margin:20px 0;
}
.cluster-alert h3{color:var(--r);margin-bottom:10px}

/* Honeypot */
.honey-panel{
border-radius:14px;padding:20px;margin:20px 0;
}
.honey-panel.safe{background:rgba(0,245,147,.04);border:1px solid rgba(0,245,147,.2)}
.honey-panel.danger{background:rgba(255,59,92,.04);border:1px solid rgba(255,59,92,.2)}

/* Links */
.links{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.link{
padding:7px 16px;border-radius:8px;
text-decoration:none;font-size:.8rem;font-weight:600;
transition:all .2s;display:inline-flex;align-items:center;gap:4px;
}
.link:hover{transform:translateY(-2px);filter:brightness(1.2)}
.link.a{background:rgba(0,245,147,.1);color:var(--g);border:1px solid rgba(0,245,147,.2)}
.link.b2{background:rgba(59,130,246,.1);color:var(--b);border:1px solid rgba(59,130,246,.2)}
.link.c{background:rgba(255,183,0,.1);color:var(--y);border:1px solid rgba(255,183,0,.2)}

.disc{
margin-top:30px;padding:16px;
background:rgba(255,183,0,.03);
border:1px solid rgba(255,183,0,.1);
border-radius:10px;text-align:center;
font-size:.75rem;color:#555;
}

.copy-btn{
background:none;border:1px solid rgba(59,130,246,.2);
color:var(--b);padding:2px 7px;border-radius:5px;
cursor:pointer;font-size:.68rem;margin-left:4px;
}
.copy-btn:hover{background:rgba(59,130,246,.1)}

@media(max-width:640px){
.search-row{flex-direction:column}
.cards{grid-template-columns:1fr}
.hd h1{font-size:1.6rem}
.score-ring{width:120px;height:120px}
.score-val .num{font-size:2.2rem}
}
</style>
</head>
<body>
<div class="app">
<div class="hd">
<h1>Pro Token Scanner</h1>
<p class="sub">AI-Powered Smart Contract Analysis Engine</p>
<div class="badges">
<span class="badge">AI Scoring</span>
<span class="badge">Cluster Detection</span>
<span class="badge">Honeypot Check</span>
<span class="badge">Bundle Analysis</span>
<span class="badge">Dev History</span>
<span class="badge">Whale Tracking</span>
</div>
</div>

<div class="search-panel">
<div class="search-row">
<input class="search-input" id="inp" placeholder="Paste Solana token address..." spellcheck="false">
<button class="scan-btn" id="btn" onclick="scan()">SCAN TOKEN</button>
</div>
<div class="status-bar" id="sbar">
<span><span class="st-dot wait"></span>Initializing RPC...</span>
</div>
</div>

<div class="loader" id="ldr">
<div class="loader-ring"></div>
<div class="loader-txt" id="ltxt">Analyzing...</div>
<div class="loader-steps" id="lsteps"></div>
</div>

<div class="err" id="err"></div>
<div class="results" id="res"></div>
</div>

<script>
/* ====== CONFIG ====== */
var RPCS=[
'https://rpc.ankr.com/solana',
'https://solana-api.projectserum.com',
'https://solana-mainnet.g.alchemy.com/v2/demo',
'https://api.mainnet-beta.solana.com'
];
var PF_PROXIES=[
'',
'https://api.allorigins.win/raw?url=',
'https://corsproxy.io/?'
];
var liveRPC=null;
var scanSteps=[];

/* ====== RPC ====== */
async function initRPC(){
var sb=document.getElementById('sbar');
for(var i=0;i<RPCS.length;i++){
try{
var r=await _rpc(RPCS[i],'getSlot',[],3500);
if(r&&r.result){
liveRPC=RPCS[i];
var n=RPCS[i].replace('https://','').split(/[\/\?]/)[0];
sb.innerHTML='<span><span class="st-dot on"></span>Connected: '+n+'</span>'+
'<span><span class="st-dot on"></span>Slot: '+r.result+'</span>';
return;
}
}catch(e){}
}
sb.innerHTML='<span><span class="st-dot off"></span>No RPC detected - will try all on scan</span>';
}

async function _rpc(url,method,params,ms){
ms=ms||12000;
var ac=new AbortController();
var t=setTimeout(function(){ac.abort()},ms);
try{
var r=await fetch(url,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({jsonrpc:'2.0',id:1,method:method,params:params}),
signal:ac.signal
});
clearTimeout(t);
return r.json();
}catch(e){clearTimeout(t);throw e;}
}

async function solRPC(method,params){
var pool=liveRPC?[liveRPC].concat(RPCS.filter(function(u){return u!==liveRPC})):RPCS;
for(var i=0;i<pool.length;i++){
try{
var r=await _rpc(pool[i],method,params);
if(r&&!r.error){liveRPC=pool[i];return r;}
}catch(e){}
}
throw new Error('RPC failed: '+method);
}

/* ====== PUMP.FUN FETCH ====== */
async function pfFetch(path){
var base='https://frontend-api.pump.fun/'+path;
for(var i=0;i<PF_PROXIES.length;i++){
try{
var url=PF_PROXIES[i]?(PF_PROXIES[i]+encodeURIComponent(base)):base;
var r=await fetch(url,{signal:AbortSignal.timeout(8000)});
if(r.ok){var d=await r.json();if(d)return d;}
}catch(e){}
}
return null;
}

/* ====== DATA FETCHERS ====== */
async function fetchTokenData(mint){
var info={decimals:6,supply:0,uiSupply:0,price:0,mcap:0,mintAuth:null,freezeAuth:null,isRenounced:true,volume24h:0,priceChange:0,liquidity:0};

try{
var sr=await solRPC('getTokenSupply',[mint]);
var sv=sr.result.value;
info.decimals=sv.decimals;
info.supply=sv.amount;
info.uiSupply=sv.uiAmount||0;
}catch(e){}

try{
var ar=await solRPC('getAccountInfo',[mint,{encoding:'jsonParsed'}]);
var pi=ar.result.value.data.parsed.info;
info.mintAuth=pi.mintAuthority||null;
info.freezeAuth=pi.freezeAuthority||null;
info.isRenounced=!pi.mintAuthority;
}catch(e){}

// Jupiter price
try{
var pr=await fetch('https://api.jup.ag/price/v2?ids='+mint);
if(pr.ok){var pd=await pr.json();if(pd.data&&pd.data[mint]){info.price=parseFloat(pd.data[mint].price)||0;info.mcap=info.price*info.uiSupply;}}
}catch(e){}

// DexScreener for volume, liquidity, price change
try{
var dr=await fetch('https://api.dexscreener.com/latest/dex/tokens/'+mint);
if(dr.ok){
var dd=await dr.json();
if(dd.pairs&&dd.pairs.length>0){
var p=dd.pairs[0];
info.volume24h=p.volume&&p.volume.h24?parseFloat(p.volume.h24):0;
info.priceChange=p.priceChange&&p.priceChange.h24?parseFloat(p.priceChange.h24):0;
info.liquidity=p.liquidity&&p.liquidity.usd?parseFloat(p.liquidity.usd):0;
if(!info.price&&p.priceUsd)info.price=parseFloat(p.priceUsd);
if(!info.mcap&&p.marketCap)info.mcap=parseFloat(p.marketCap);
if(!info.mcap&&p.fdv)info.mcap=parseFloat(p.fdv);
}
}
}catch(e){}

return info;
}

async function fetchHolders(mint,uiSupply){
var holders=[],t5=0,t10=0;
try{
var r=await solRPC('getTokenLargestAccounts',[mint]);
var accs=r.result.value||[];
for(var i=0;i<accs.length;i++){
var a=accs[i];
holders.push({
addr:a.address,
amount:parseFloat(a.uiAmount||0),
pct:uiSupply>0?(parseFloat(a.uiAmount||0)/uiSupply*100):0,
owner:null
});
}
}catch(e){}

// resolve owners concurrently
var tasks=[];
for(var j=0;j<Math.min(holders.length,10);j++){
(function(idx){
tasks.push(
solRPC('getAccountInfo',[holders[idx].addr,{encoding:'jsonParsed'}])
.then(function(r){
try{holders[idx].owner=r.result.value.data.parsed.info.owner;}catch(e){}
}).catch(function(){})
);
})(j);
}
await Promise.allSettled(tasks);

t5=holders.slice(0,5).reduce(function(s,h){return s+h.pct},0);
t10=holders.slice(0,10).reduce(function(s,h){return s+h.pct},0);
return{list:holders,t5:t5,t10:t10,count:holders.length};
}

async function fetchPump(mint){
var d={is:false,dev:null,devBal:0,bc:null,done:false,pool:null,
name:'',sym:'',desc:'',tw:'',tg:'',web:'',mcap:0,created:null,
replies:0,nsfw:false};

var raw=await pfFetch('coins/'+mint);
if(raw&&raw.mint){
d.is=true;
d.dev=raw.creator;d.bc=raw.bonding_curve;
d.done=raw.complete||false;d.pool=raw.raydium_pool;
d.name=raw.name||'';d.sym=raw.symbol||'';
d.desc=raw.description||'';
d.tw=raw.twitter||'';d.tg=raw.telegram||'';d.web=raw.website||'';
d.mcap=raw.usd_market_cap||0;
d.created=raw.created_timestamp;
d.nsfw=raw.nsfw||false;
}

if(d.dev){
try{
var br=await solRPC('getBalance',[d.dev]);
d.devBal=(br.result.value||0)/1e9;
}catch(e){}
}
return d;
}

async function fetchDevHistory(dev,currentMint){
var out={addr:dev,total:0,rugs:0,ok:0,dead:0,tokens:[],rep:'unknown',bal:0};
if(!dev)return out;

var raw=await pfFetch('coins/user-created-coins/'+dev+'?offset=0&limit=100&includeNsfw=true');
if(!Array.isArray(raw))return out;

out.total=raw.length;
for(var i=0;i<raw.length;i++){
var t=raw[i],mc=t.usd_market_cap||0,st;
if(t.complete&&t.raydium_pool&&mc>30000){st='live';out.ok++;}
else if(!t.complete&&mc<500){st='rug';out.rugs++;}
else{st='dead';out.dead++;}
out.tokens.push({n:t.name||'Unnamed',s:t.symbol||'--',m:t.mint,mc:mc,st:st,cur:t.mint===currentMint});
}

var rr=out.total>0?out.rugs/out.total:0;
if(out.total<=1)out.rep='new';
else if(rr>0.6)out.rep='scammer';
else if(rr>0.3)out.rep='suspicious';
else if(out.ok>=2)out.rep='trusted';
else out.rep='neutral';

return out;
}

/* ====== AI ANALYSIS ====== */
function clusterScan(holders){
var r={found:false,pct:0,risk:'low',groups:[]};
var hs=holders.filter(function(h){return h.pct>=0.4&&h.pct<20});
if(hs.length<4)return r;

var used={};
for(var i=0;i<hs.length;i++){
if(used[i])continue;
var g=[i];
for(var j=i+1;j<hs.length;j++){
if(used[j])continue;
var rat=hs[i].amount>0?hs[j].amount/hs[i].amount:0;
if(rat>.7&&rat<1.3){g.push(j);used[j]=1;}
}
if(g.length>=3){
var p=0;for(var k=0;k<g.length;k++)p+=hs[g[k]].pct;
r.groups.push({n:g.length,p:p});
r.pct+=p;r.found=true;
}
used[i]=1;
}
r.risk=r.pct>30?'high':r.pct>15?'medium':'low';
return r;
}

function bundleCheck(holders,pump){
var bundled=0,bundlePct=0;
// check for wallets that bought at same time (similar amounts near bonding curve)
if(holders.length>=5){
var amounts=holders.slice(0,20).map(function(h){return h.amount}).filter(function(a){return a>0});
amounts.sort(function(a,b){return a-b});
for(var i=0;i<amounts.length-2;i++){
var a1=amounts[i],a2=amounts[i+1],a3=amounts[i+2];
if(a1>0&&Math.abs(a2-a1)/a1<0.15&&Math.abs(a3-a1)/a1<0.15){
bundled+=3;
var matching=holders.filter(function(h){return Math.abs(h.amount-a1)/a1<0.15});
bundlePct=matching.reduce(function(s,h){return s+h.pct},0);
break;
}
}
}
return{detected:bundled>=3,count:bundled,pct:bundlePct};
}

function honeypotCheck(tokenInfo,pump){
var flags=[];var safe=true;
if(tokenInfo.mintAuth){flags.push('Mint authority active');safe=false;}
if(tokenInfo.freezeAuth){flags.push('Freeze authority active');safe=false;}
if(tokenInfo.liquidity>0&&tokenInfo.liquidity<500){flags.push('Very low liquidity: $'+F(tokenInfo.liquidity));safe=false;}
if(tokenInfo.volume24h>0&&tokenInfo.mcap>0){
var vr=tokenInfo.volume24h/tokenInfo.mcap;
if(vr>5){flags.push('Suspicious volume/mcap ratio: '+vr.toFixed(1)+'x');safe=false;}
}
if(pump.is&&!pump.done&&!pump.pool){flags.push('No trading pool yet');}
return{safe:safe,flags:flags};
}

function aiScore(ti,hd,pf,dev,cl,bundle,honey){
var s=100,risks=[],pros=[];

// Security checks
if(ti.mintAuth){s-=25;risks.push('Mint Authority active - can create new tokens');}
else{pros.push('Mint Authority renounced');}

if(ti.freezeAuth){s-=20;risks.push('Freeze Authority active - can freeze wallets');}
else{pros.push('No Freeze Authority');}

// Holder distribution
if(hd.t10>50){s-=20;risks.push('Top 10 hold '+hd.t10.toFixed(1)+'% - extreme concentration');}
else if(hd.t10>35){s-=12;risks.push('Top 10 hold '+hd.t10.toFixed(1)+'% - high concentration');}
else if(hd.t10>20){s-=5;risks.push('Top 10 hold '+hd.t10.toFixed(1)+'% - moderate');}
else{pros.push('Excellent distribution - Top 10: '+hd.t10.toFixed(1)+'%');}

if(hd.list[0]&&hd.list[0].pct>20){s-=15;risks.push('Whale alert: #1 holds '+hd.list[0].pct.toFixed(1)+'%');}

// Cluster
if(cl.found){
if(cl.risk==='high'){s-=22;risks.push('HIGH cluster risk: '+cl.pct.toFixed(1)+'% in coordinated wallets');}
else{s-=10;risks.push('Cluster detected: '+cl.pct.toFixed(1)+'%');}
}else{pros.push('No clusters detected');}

// Bundle
if(bundle.detected){s-=18;risks.push('Bundled buys detected: ~'+bundle.count+' wallets ('+bundle.pct.toFixed(1)+'%)');}
else{pros.push('No bundled buys detected');}

// Honeypot
if(!honey.safe){s-=10;for(var i=0;i<honey.flags.length;i++)risks.push('Honeypot flag: '+honey.flags[i]);}
else{pros.push('Honeypot checks passed');}

// Dev
if(dev.rep==='scammer'){s-=30;risks.push('Developer is likely SCAMMER ('+dev.rugs+'/'+dev.total+' rugged)');}
else if(dev.rep==='suspicious'){s-=15;risks.push('Developer has suspicious history');}
else if(dev.rep==='trusted'){s+=5;pros.push('Developer is trusted ('+dev.ok+' successful tokens)');}
else if(dev.rep==='new'){s-=5;risks.push('New developer - no history');}

// Pump.fun specifics
if(pf.is){
pros.push('Pump.Fun token');
if(pf.done){s+=5;pros.push('Bonding curve completed');}
else{s-=5;risks.push('Bonding curve incomplete');}
if(pf.pool){s+=5;pros.push('Raydium pool exists');}
if(!pf.tw&&!pf.tg&&!pf.web){s-=5;risks.push('No social media');}
else{
if(pf.tw)pros.push('Twitter linked');
if(pf.tg)pros.push('Telegram linked');
if(pf.web)pros.push('Website linked');
}
}

// Liquidity
if(ti.liquidity>10000){pros.push('Good liquidity: $'+F(ti.liquidity));}
else if(ti.liquidity>0){risks.push('Low liquidity: $'+F(ti.liquidity));}

// Volume
if(ti.volume24h>5000){pros.push('Healthy volume: $'+F(ti.volume24h));}

s=Math.max(0,Math.min(100,Math.round(s)));
var mcap=pf.mcap||ti.mcap||0;
return{score:s,risks:risks,pros:pros,mcap:mcap};
}

function genTargets(mcap,score){
var f=score/100;
return[
{x:'2x',mc:mcap*2,p:Math.min(28+f*40,75)},
{x:'5x',mc:mcap*5,p:Math.min(12+f*28,55)},
{x:'10x',mc:mcap*10,p:Math.min(6+f*20,40)},
{x:'50x',mc:mcap*50,p:Math.min(2+f*10,18)},
{x:'100x',mc:mcap*100,p:Math.min(1+f*6,10)}
];
}

function genAIVerdict(score,ti,pf,dev,cl,bundle,honey){
var lines=[];
if(score>=75)lines.push('This token shows strong safety indicators. The smart contract appears clean with renounced authorities.');
else if(score>=50)lines.push('This token has moderate risk factors. Some concerns were identified that require caution.');
else if(score>=30)lines.push('WARNING: Multiple red flags detected. This token carries significant risk.');
else lines.push('DANGER: This token has critical security issues and is very likely a scam or rug pull.');

if(dev.rep==='scammer')lines.push('The developer has a history of rug pulls ('+dev.rugs+' out of '+dev.total+' tokens). Extremely high risk.');
else if(dev.rep==='trusted')lines.push('The developer has a positive track record with '+dev.ok+' successful tokens.');
else if(dev.rep==='new')lines.push('This is a new developer with no previous history - exercise extra caution.');

if(cl.found)lines.push('Cluster analysis reveals coordinated wallets holding '+cl.pct.toFixed(1)+'% - possible insider accumulation.');
if(bundle.detected)lines.push('Bundled buy patterns detected suggesting coordinated market entry.');
if(!honey.safe)lines.push('Honeypot warning flags: '+honey.flags.join(', ')+'.');

if(ti.liquidity>0&&ti.liquidity<2000)lines.push('Extremely low liquidity ($'+F(ti.liquidity)+') makes this token highly susceptible to price manipulation.');

return lines.join(' ');
}

/* ====== MAIN SCAN ====== */
async function scan(){
var mint=document.getElementById('inp').value.trim();
if(!mint)return sErr('Enter a token address');
if(!/^[A-Za-z0-9]{32,44}$/.test(mint))return sErr('Invalid address format');

hErr();document.getElementById('res').className='results';
sLoad(1);sBtn(1);scanSteps=[];

try{
addStep('Connecting to Solana RPC...');
await sleep(300);markStep(0);

addStep('Fetching token data...');
var ti=await fetchTokenData(mint);markStep(1);

addStep('Analyzing holder distribution...');
var hd=await fetchHolders(mint,ti.uiSupply);markStep(2);

addStep('Querying Pump.Fun data...');
var pf=await fetchPump(mint);markStep(3);

addStep('Analyzing developer history...');
var dev=await fetchDevHistory(pf.dev,mint);
dev.bal=pf.devBal;markStep(4);

addStep('Running cluster analysis...');
var cl=clusterScan(hd.list);markStep(5);

addStep('Checking bundled buys...');
var bundle=bundleCheck(hd.list,pf);markStep(6);

addStep('Running honeypot detection...');
var honey=honeypotCheck(ti,pf);markStep(7);

addStep('AI scoring engine...');
var an=aiScore(ti,hd,pf,dev,cl,bundle,honey);markStep(8);

addStep('Generating report...');
var targets=genTargets(an.mcap,an.score);
var verdict=genAIVerdict(an.score,ti,pf,dev,cl,bundle,honey);
markStep(9);

sLoad(0);sBtn(0);
buildUI(mint,ti,hd,pf,dev,cl,bundle,honey,an,targets,verdict);

}catch(e){
sLoad(0);sBtn(0);
console.error(e);
sErr('Scan failed: '+e.message);
}
}

/* ====== HELPERS ====== */
function F(n){
if(!n||n===0)return'0';
if(n>=1e9)return(n/1e9).toFixed(2)+'B';
if(n>=1e6)return(n/1e6).toFixed(2)+'M';
if(n>=1e3)return(n/1e3).toFixed(2)+'K';
return Number(n).toFixed(2);
}
function S(a){return a&&a.length>10?a.slice(0,6)+'...'+a.slice(-4):(a||'N/A');}
function mkRow(k,v){return'<div class="row"><span class="k">'+k+'</span><span class="v2">'+v+'</span></div>';}
function mkStat(l,v,c){return'<div class="stat"><div class="l">'+l+'</div><div class="v" style="color:'+c+'">'+v+'</div></div>';}
function devClr(r){return{scammer:'var(--r)',suspicious:'#ff6600',trusted:'var(--g)','new':'var(--y)',neutral:'#888'}[r]||'#888';}
function devLbl(r){return{scammer:'SCAMMER',suspicious:'Suspicious',trusted:'Trusted','new':'New Dev',neutral:'Neutral',unknown:'Unknown'}[r]||'Unknown';}
function C(t){try{navigator.clipboard.writeText(t)}catch(e){}}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}

// Loader
function sLoad(v){document.getElementById('ldr').className=v?'loader on':'loader'}
function sBtn(d){var b=document.getElementById('btn');b.disabled=!!d;b.textContent=d?'SCANNING...':'SCAN TOKEN';}
function sErr(m){var e=document.getElementById('err');e.innerHTML=m;e.className='err on';}
function hErr(){document.getElementById('err').className='err';}

function addStep(txt){
var el=document.getElementById('lsteps');
var idx=scanSteps.length;
scanSteps.push(txt);
var d=document.createElement('div');
d.className='step active';d.id='step'+idx;
d.innerHTML='<span class="st-dot wait"></span>'+txt;
el.appendChild(d);
document.getElementById('ltxt').textContent=txt;
}
function markStep(idx){
var el=document.getElementById('step'+idx);
if(el){el.className='step done';var dot=el.querySelector('.st-dot');if(dot){dot.className='st-dot on';}}
}

// Events
document.getElementById('inp').addEventListener('keydown',function(e){if(e.key==='Enter')scan()});

// Init
initRPC();
